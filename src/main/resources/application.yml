spring:
  application:
    name: mama
  config:
    import: "optional:file:./.env[.properties]"
  datasource:
    url: "jdbc:sqlite:${SQLITE_PATH:./data/mama.db}"
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: true
    open-in-view: false

mama:
  kis:
    app-key: ${IMI_KIS_APP_KEY:}
    app-secret: ${IMI_KIS_APP_SECRET:}
    account-no: ${IMI_KIS_ACCOUNT_NO:}
    paper-trading: ${KIS_PAPER_TRADING:true}
    base-url: https://openapi.koreainvestment.com:9443
    paper-base-url: https://openapivts.koreainvestment.com:29443
    token-cache-path: ${KIS_TOKEN_CACHE_PATH:./data/kis-token.json}
  dart:
    api-key: ${DART_API_KEY:}
    base-url: https://opendart.fss.or.kr/api
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.serveone.mama: DEBUG
